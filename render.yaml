services:
  - type: web
    name: digital-queue-backend
    runtime: docker
    plan: free
    rootDir: .
    dockerContext: .
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/public/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: PGHOST
        fromDatabase:
          name: digital-queue-postgres
          property: host
      - key: PGPORT
        fromDatabase:
          name: digital-queue-postgres
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: digital-queue-postgres
          property: database
      - key: PGUSER
        fromDatabase:
          name: digital-queue-postgres
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: digital-queue-postgres
          property: password
      - key: APP_CORS_ALLOWED_ORIGIN_PATTERNS
        value: https://*.onrender.com

  - type: web
    name: digital-queue-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://digital-queue-backend.onrender.com

databases:
  - name: digital-queue-postgres
    databaseName: digital_queue_render
    user: digital_queue_user
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
